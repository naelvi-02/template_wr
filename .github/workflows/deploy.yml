name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deploy to VPS via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        password: ${{ secrets.VPS_PASSWORD }}
        port: ${{ secrets.VPS_PORT }}
        script: |
          set -e
          if [ ! -d "$HOME/template_wr" ]; then
            git clone https://github.com/naelvi-02/template_wr.git "$HOME/template_wr"
          fi
          cd "$HOME/template_wr"
          git fetch origin
          git reset --hard origin/main
          if ! command -v pm2 &> /dev/null; then
            npm install -g pm2
          fi
          rm -rf node_modules
          npm install
          rm -rf .next
          npm run build
          pm2 restart wr-template-app || pm2 start npm --name "wr-template-app" -- start
